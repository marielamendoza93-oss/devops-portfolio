name: Full System Monitoring CI

on:
  push:
    branches: [ main ]

jobs:
  system-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bash python3 python3-pip
          pip3 install psutil

      - name: Run Bash system monitor
        run: |
          chmod +x linux/system_monitor.sh
          mkdir -p logs
          bash linux/system_monitor.sh > logs/bash_report.log

      - name: Run Python system monitor
        run: |
          python3 python-scripts/system_monitor.py > logs/python_report.log

      - name: Upload all logs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: system-monitor-reports
          path: logs/