name: DevOps Monitoring Pipeline (Dockerized)

on:
  push:
    branches: [ main ]

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t devops-monitor .

      - name: Run container and capture logs
        run: |
          mkdir -p logs
          docker run devops-monitor > logs/container_report.log

      - name: Upload logs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devops-monitor-report
          path: logs/