name: System Monitor CI (with Logs)

on:
  push:
    branches: [ main ]

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x linux/system_monitor.sh

      - name: Run system monitor and save output
        run: |
          mkdir -p logs
          bash linux/system_monitor.sh > logs/system_report.log

      - name: Upload log artifact
        uses: actions/upload-artifact@v4
        with:
          name: system-monitor-log
          path: logs/system_report.log